<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EcoRoute (Google Maps)</title>
  <style>
    :root{
      --bg:#0b1220; --card:#121b2f; --text:#e8eefc; --muted:#a8b3d6;
      --good:#38d39f; --mid:#f7c948; --bad:#ff6b6b; 
      --border:#263458;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text)}
    .wrap{max-width:1200px;margin:0 auto;padding:18px}
    header.wrap{padding-bottom:8px}
    h1{margin:0 0 6px}
    p{margin:0;color:var(--muted)}
    .layout{display:grid;grid-template-columns:380px 1fr;gap:14px;align-items:start}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin:14px 0}
    label{display:flex;flex-direction:column;gap:6px;font-size:14px;color:var(--muted);margin:10px 0}
    input,select,button{
      width:100%;
      padding:10px;border-radius:10px;border:1px solid #2a3a64;background:#0e1730;color:var(--text)
    }
    button{cursor:pointer;background:#1b2d5c;border-color:#2a3a64;font-weight:700}
    button:hover{filter:brightness(1.1)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .note{color:var(--muted);margin:10px 0 0;min-height:18px}
    #map{
      width: 130%;
      height: 720px;
      border-radius:14px;
      border:1px solid var(--border);
      overflow:hidden;
      background:#0e1730;
    }
    .results{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .mode{padding:14px;border:1px solid var(--border);border-radius:14px;background:#0e1730;position:relative}
    .badge{position:absolute;top:12px;right:12px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800}
    .bar{height:10px;background:#16254b;border-radius:999px;overflow:hidden;margin:10px 0}
    .fill{height:100%}
    .kpi{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin:4px 0}
    .tiny{color:var(--muted);font-size:12px}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin-top:8px}
    .pill{padding:6px 10px;border:1px solid var(--border);border-radius:999px;background:#0e1730}
    @media (max-width: 980px){
      .layout{grid-template-columns:1fr}
      #map{height:420px}
    }
  </style>
</head>
<body>
  <header class="wrap">
    <h1>EcoRoute</h1>
    <p>Type an origin + destination (with Google suggestions), get distance from Google Maps, then compare carbon + cost.</p>
  </header>

  <main class="wrap">
    <div class="layout">
      <!-- LEFT -->
      <div>
        <section class="card">
          <h2 style="margin:0 0 10px;">Trip (Google Maps)</h2>

          <label>
            From
            <input id="origin" type="text" placeholder="Start typing an address..." autocomplete="off" />
          </label>

          <label>
            To
            <input id="destination" type="text" placeholder="Start typing an address..." autocomplete="off" />
          </label>

          <div class="row">
            <label>
              Unit
              <select id="unit">
                <option value="mi" selected>miles</option>
                <option value="km">km</option>
              </select>
            </label>

            <label>
              Bus passengers (optional)
              <input id="busPassengers" type="number" min="1" step="1" value="1" />
            </label>
          </div>

          <div class="row" style="margin-top:10px">
            <button id="routeBtn">Route + Compare</button>
            <button id="clearBtn" style="background:#182447">Clear</button>
          </div>

          <div id="tripMeta" class="meta" style="display:none">
            <span class="pill" id="metaDistance"></span>
            <span class="pill" id="metaDuration"></span>
          </div>

          <p class="note" id="note"></p>
        </section>

        <section class="card">
          <h2 style="margin:0 0 10px;">Results</h2>
          <div id="results" class="results"></div>
          <p class="tiny" style="margin-top:10px">
            Assumptions are demo-grade estimates (good for hackathon judging).
          </p>
        </section>
      </div>

      <!-- RIGHT -->
      <div class="card" style="margin-top:0">
        <h2 style="margin:0 0 10px;">Map</h2>
        <div id="map"></div>
      </div>
    </div>
  </main>

  <script>
    /***********************
     *  Emissions model
     ***********************/
    const KM_PER_MI = 1.60934;
    const KG_PER_TREE_YEAR = 21;

    const MODES = [
      { key: "gasCar", name: "Gas Car" },
      { key: "ev",     name: "Electric Vehicle" },
      { key: "bus",    name: "Bus" },
      { key: "bike",   name: "Bike" },
      { key: "walk",   name: "Walk" },
    ];

    // Quick MVP factors (kg CO2 per mile, $ per mile). Tweak anytime.
    const FACTORS = {
      gasCar: { kgPerMile: 0.404, costPerMile: 0.17 },
      ev:     { kgPerMile: 0.160, costPerMile: 0.06 },
      bus:    { kgPerMile: 0.089, costPerMile: 0.10 }, // baseline per passenger-mile-ish
      bike:   { kgPerMile: 0.0,   costPerMile: 0.01 },
      walk:   { kgPerMile: 0.0,   costPerMile: 0.00 }
    };

    function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }
    function formatKg(x){ return `${x.toFixed(2)} kg CO₂`; }
    function formatUsd(x){ return `$${x.toFixed(2)}`; }
    function scoreColor(score){
      if (score >= 75) return "var(--good)";
      if (score >= 45) return "var(--mid)";
      return "var(--bad)";
    }

    function compute(distanceMiles, busPassengers) {
      const rows = MODES.map(m => {
        const f = FACTORS[m.key];
        let kg = f.kgPerMile * distanceMiles;
        let cost = f.costPerMile * distanceMiles;

        if (m.key === "bus") {
          const p = clamp(busPassengers || 1, 1, 80);
          kg = kg / p; // split bus emissions across riders
        }
        return { ...m, kg, cost };
      });

      const minKg = Math.min(...rows.map(r => r.kg));
      const maxKg = Math.max(...rows.map(r => r.kg));
      const worstKg = maxKg;

      rows.forEach(r => {
        const denom = (maxKg - minKg);
        const raw = denom === 0 ? 100 : 100 * (1 - (r.kg - minKg) / denom);
        r.score = Math.round(clamp(raw, 0, 100));
        r.trees = r.kg / KG_PER_TREE_YEAR;
        r.savingsVsWorst = worstKg - r.kg;
      });

      rows.sort((a,b) => a.kg - b.kg);
      return rows;
    }

    function renderResults(distanceMiles) {
      const busPassengers = Number(document.getElementById("busPassengers").value);
      const rows = compute(distanceMiles, busPassengers);

      const elResults = document.getElementById("results");
      const worst = Math.max(...rows.map(r => r.kg));
      const best = Math.min(...rows.map(r => r.kg));

      elResults.innerHTML = rows.map(r => {
        const pct = worst === 0 ? 0 : (r.kg / worst) * 100;
        const badgeBg = scoreColor(r.score);
        return `
          <div class="mode">
            <div class="badge" style="background:${badgeBg}; color:#06101a;">
              Green Score ${r.score}
            </div>
            <h3 style="margin:0 0 6px">${r.name}</h3>

            <div class="bar"><div class="fill" style="width:${pct}%; background:${badgeBg};"></div></div>

            <div class="kpi"><span>Emissions</span><strong>${formatKg(r.kg)}</strong></div>
            <div class="kpi"><span>Est. cost</span><strong>${formatUsd(r.cost)}</strong></div>
            <div class="kpi"><span>Savings vs worst</span><strong>${formatKg(r.savingsVsWorst)}</strong></div>
            <div class="kpi"><span>Trees/year to offset</span><strong>${r.trees.toFixed(2)}</strong></div>

            ${r.kg === best ? `<p class="note">🌿 Greenest option for this trip.</p>` : ``}
          </div>
        `;
      }).join("");
    }

    /***********************
     *  Google Maps wiring
     ***********************/
    let map, directionsService, directionsRenderer;
    let originAutocomplete, destinationAutocomplete;

    const elNote = document.getElementById("note");
    const elTripMeta = document.getElementById("tripMeta");
    const elMetaDistance = document.getElementById("metaDistance");
    const elMetaDuration = document.getElementById("metaDuration");

    function setNote(msg){ elNote.textContent = msg || ""; }

    // Called by Google Maps script (callback=initMap)
    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 39.5, lng: -98.35 }, // US-ish default
        zoom: 4,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: false,
      });

      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer({
        map,
        suppressMarkers: false
      });

      // Autocomplete dropdown suggestions
      const originInput = document.getElementById("origin");
      const destinationInput = document.getElementById("destination");

      originAutocomplete = new google.maps.places.Autocomplete(originInput, {
        fields: ["place_id", "formatted_address", "geometry", "name"],
      });
      destinationAutocomplete = new google.maps.places.Autocomplete(destinationInput, {
        fields: ["place_id", "formatted_address", "geometry", "name"],
      });

      // Nice UX: pressing Enter runs route
      originInput.addEventListener("keydown", (e) => { if (e.key === "Enter") routeAndCompare(); });
      destinationInput.addEventListener("keydown", (e) => { if (e.key === "Enter") routeAndCompare(); });

      document.getElementById("routeBtn").addEventListener("click", routeAndCompare);
      document.getElementById("clearBtn").addEventListener("click", clearAll);

      setNote("Tip: pick from the address dropdown suggestions for best results.");
    }

    function clearAll(){
      document.getElementById("origin").value = "";
      document.getElementById("destination").value = "";
      document.getElementById("results").innerHTML = "";
      elTripMeta.style.display = "none";
      setNote("");
      if (directionsRenderer) directionsRenderer.set("directions", null);
    }

    function metersToMiles(m){ return m / 1609.344; }
    function metersToKm(m){ return m / 1000; }

    function routeAndCompare(){
      const originText = document.getElementById("origin").value.trim();
      const destinationText = document.getElementById("destination").value.trim();
      const unit = document.getElementById("unit").value;

      if (!originText || !destinationText){
        setNote("Please enter both a From and To address (choose from the dropdown suggestions).");
        return;
      }

      setNote("Routing...");
      elTripMeta.style.display = "none";

      directionsService.route(
        {
          origin: originText,
          destination: destinationText,
          travelMode: google.maps.TravelMode.DRIVING, // we use driving to get realistic road distance
        },
        (result, status) => {
          if (status !== "OK" || !result?.routes?.[0]?.legs?.[0]) {
            setNote("Couldn’t route that. Try selecting addresses from the dropdown suggestions.");
            return;
          }

          directionsRenderer.setDirections(result);

          const leg = result.routes[0].legs[0];
          const meters = leg.distance.value;     // exact meters from Google
          const durationText = leg.duration.text;

          const distanceForDisplay = (unit === "km")
            ? `${metersToKm(meters).toFixed(2)} km`
            : `${metersToMiles(meters).toFixed(2)} mi`;

          // Our calculator works in miles internally
          const distanceMiles = metersToMiles(meters);

          elMetaDistance.textContent = `Distance: ${distanceForDisplay}`;
          elMetaDuration.textContent = `ETA (driving): ${durationText}`;
          elTripMeta.style.display = "flex";

          renderResults(distanceMiles);
          setNote("");
        }
      );
    }

    // Expose initMap to global scope for Google callback
    window.initMap = initMap;
  </script>

  <!--
    ✅ Paste your Google Maps JavaScript API key below.
    You need these APIs enabled in Google Cloud:
      - Maps JavaScript API
      - Places API (for address dropdown suggestions)
      - Directions API (for routing + distance)
    Also: billing must be enabled on the project.

    Replace YOUR_API_KEY_HERE with your key.
  -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBE68r3pm1I4hu0zn65s7mXK82d9Zh3q5U&libraries=places&callback=initMap"
    async
    defer
  ></script>
</body>
</html>
